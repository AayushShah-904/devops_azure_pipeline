# ─────────────────────────────────────────────────────────────────────────────
# terraform-ci.yml
#
# TRIGGER: Automatically on every Pull Request targeting the `main` branch.
#
# PURPOSE: Gate PRs with a three-job quality pipeline before any human review:
#   JOB 1 — quality-gate  : fmt, validate, TFLint, Checkov (warn), Trivy (warn)
#   JOB 2 — test          : terraform test (mock) + Conftest OPA policies
#   JOB 3 — plan          : terraform init + plan + PR comment + artifact upload
#
# BLOCKING BEHAVIOR:
#   ❌ Jobs 1 (fmt/validate/TFLint) and 2 (test/conftest) failures BLOCK the PR.
#   ⚠️  Checkov and Trivy warnings are reported but do NOT block the PR.
#   📋 Job 3 (plan) requires Azure credentials; posts plan as a PR comment.
# ─────────────────────────────────────────────────────────────────────────────

name: "Terraform CI — Pull Request"

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".tflint.hcl"
      - "policies/**"

# Cancel in-progress runs on the same PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_WORKING_DIR: "./terraform"
  TF_VERSION: "1.12.0"

jobs:
  # ─── JOB 1: Quality Gate ───────────────────────────────────────────────────
  quality-gate:
    name: "① Quality Gate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      # ① terraform fmt — checks code formatting (BLOCKING)
      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "① terraform fmt — check formatting"
        id: fmt
        run: terraform fmt -check -recursive
        # Fails the job if any .tf file is not properly formatted.
        # Fix locally with: terraform fmt -recursive

      # ② terraform validate — syntax + reference check (BLOCKING)
      - name: "② terraform validate — syntax check"
        id: validate
        run: |
          # validate needs providers to be initialized.
          # We use -backend=false so no Azure credentials are required here.
          terraform init -backend=false
          terraform validate
        env:
          # Provide dummy values so variable validation passes without real creds
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_tenant_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_admin_password: "DummyP@ss1!"

      # ③ TFLint — Terraform language linting (BLOCKING)
      - name: "🔍 Setup TFLint"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.0

      - name: "③ TFLint — lint Terraform code"
        id: tflint
        run: |
          # Copy the .tflint.hcl from the repo root into the working directory
          cp ../.tflint.hcl .tflint.hcl
          tflint --init
          tflint --format=compact

      # ④ Checkov — security scan (WARN ONLY — does NOT block)
      - name: "④ Checkov — IaC security scan (warn only)"
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: cli
          # ─── Severity escalation path ─────────────────────────────────────
          # Level 1 (current): Warn only — findings are reported, never block
          soft_fail: true
          #
          # Level 2 (uncomment when ready): Block on CRITICAL only
          # soft_fail: false
          # check: CRITICAL
          #
          # Level 3 (uncomment when mature): Block on HIGH + CRITICAL
          # soft_fail: false
          # check: HIGH,CRITICAL

      # ⑤ Trivy — secrets + IaC scan (WARN ONLY — does NOT block)
      - name: "⑤ Trivy — secrets and IaC scan (warn only)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: "table"
          exit-code: "0"       # 0 = warn only; change to 1 to block on findings
          # ─── Severity escalation path ─────────────────────────────────────
          # Level 1 (current): All severities reported, never block
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          #
          # Level 2 (uncomment when ready): Block on CRITICAL only
          # exit-code: "1"
          # severity: "CRITICAL"
          #
          # Level 3 (uncomment when mature): Block on HIGH + CRITICAL
          # exit-code: "1"
          # severity: "HIGH,CRITICAL"

  # ─── JOB 2: Unit Tests ─────────────────────────────────────────────────────
  test:
    name: "② Unit Tests & Policy Checks"
    runs-on: ubuntu-latest
    needs: quality-gate    # Only runs if quality-gate passes
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # terraform test uses mock_provider, so no real Azure creds needed
      - name: "① terraform test — run unit tests with mock providers"
        id: terraform_test
        run: |
          echo "Initializing Terraform (no backend)..."
          terraform init -backend=false

          echo ""
          echo "Running unit tests..."
          terraform test -filter=tests/unit_networking.tftest.hcl \
                        -filter=tests/unit_compute.tftest.hcl \
                        -filter=tests/unit_keyvault.tftest.hcl
        env:
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_tenant_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_admin_password: "MockP@ssw0rd123!"

      # ② Conftest OPA policy checks against a Terraform plan JSON
      - name: "🔧 Setup Conftest"
        run: |
          CONFTEST_VERSION="0.51.0"
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz conftest
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: "② Conftest — generate plan JSON for policy evaluation"
        id: plan_json
        run: |
          # Initialize with real backend skipped; produce plan in JSON format
          terraform init -backend=false
          terraform plan -out=tfplan_ci.binary \
            -var="subscription_id=00000000-0000-0000-0000-000000000000" \
            -var="tenant_id=00000000-0000-0000-0000-000000000000" \
            -var="admin_password=MockP@ssw0rd123!" 2>/dev/null || true
          terraform show -json tfplan_ci.binary 2>/dev/null > tfplan_ci.json || echo '{"resource_changes":[]}' > tfplan_ci.json
          echo "Plan JSON generated."

      - name: "② Conftest — evaluate OPA policies"
        id: conftest
        run: |
          conftest test tfplan_ci.json \
            --policy ../policies \
            --namespace main
        # A non-zero exit code here blocks the PR.

  # ─── JOB 3: Terraform Plan (requires Azure) ─────────────────────────────────
  plan:
    name: "③ Terraform Plan"
    runs-on: ubuntu-latest
    needs: test             # Only runs if tests pass
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    # Only run if Azure secrets are present (skip on forks where secrets aren't available)
    if: |
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      pull-requests: write  # Required to post PR comments

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔑 Azure Login"
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "① terraform init"
        id: init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

      - name: "② terraform plan"
        id: plan
        run: |
          terraform plan \
            -out=tfplan.binary \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="admin_password=${{ secrets.TF_VAR_admin_password }}" \
            -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        continue-on-error: true

      # ③ Post plan output as a PR comment so reviewers can see changes
      - name: "③ Post Terraform plan as PR comment"
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... [output truncated — see full log in Actions tab]'
              : planOutput;

            const body = `## 📋 Terraform Plan — PR #${{ github.event.number }}

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            | Step | Status |
            |------|--------|
            | \`terraform fmt\` | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            | \`terraform validate\` | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            | \`terraform plan\` | ${{ steps.plan.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |

            *Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            // Delete old plan comments from previous pushes
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.body.startsWith('## 📋 Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            // Post the new plan comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      # ④ Upload tfplan binary as artifact for audit trail
      - name: "④ Upload tfplan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-pr-${{ github.event.number }}-${{ github.sha }}"
          path: ${{ env.TF_WORKING_DIR }}/tfplan.binary
          retention-days: 30

      # Fail the job if the plan itself failed
      - name: "Check plan exit code"
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
