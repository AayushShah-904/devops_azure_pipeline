name: "Terraform CI"

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
      - "policies/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate-and-test:
    name: "Quality Gate & Offline Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint -f compact

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          soft_fail: true # Warn only (change to false/remove to fail pipeline)

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform'
          exit-code: 0 # Warn only (change to 1 to fail pipeline)
          format: 'table'

      - name: Run Terraform Native Tests
        run: terraform test
        working-directory: terraform

  plan:
    name: "Terraform Plan & Policies"
    needs: quality-gate-and-test
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Install Conftest
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          # strip 'v' prefix
          VERSION=${LATEST_VERSION#v}
          wget https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz
          tar xzf conftest_${VERSION}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan > plan_output.txt
          # Keep only the important part of the plan (discard init/refresh output)
          # Find where the plan summary starts and capture from there
          cat plan_output.txt | grep -A 500 "Terraform will perform the following actions" > clean_plan.txt || cat plan_output.txt > clean_plan.txt
        working-directory: terraform

      - name: Convert Plan to JSON for Conftest
        run: |
          terraform show -json tfplan > tfplan.json
        working-directory: terraform

      - name: Run Conftest Policy Checks
        run: |
          conftest test terraform/tfplan.json --policy policies
        # This will fail the pipeline if OPA policies are violated

      - name: Post Plan to Pull Request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN=$(cat terraform/clean_plan.txt)
          comment_body=$(cat <<EOF
          #### Terraform Plan Output
          \`\`\`diff
          $PLAN
          \`\`\`
          EOF
          )
          gh pr comment ${{ github.event.pull_request.number }} --body "$comment_body"

      - name: Upload Terraform Plan File
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5
