# ─────────────────────────────────────────────────────────────────────────────
# terraform-deploy.yml
#
# TRIGGER: Manual — GitHub Actions UI → "Run workflow" button.
#
# PURPOSE: Controlled deploy workflow for the sandbox infrastructure.
#   INPUT:  dropdown → "plan" (safe, read-only) or "apply" (makes changes)
#
#   JOB 1 — quality-gate : Same 5 checks as CI (safety net before deploy)
#   JOB 2 — test         : Same terraform test + Conftest OPA policies
#   JOB 3 — deploy       : terraform plan always; terraform apply only if chosen
#
# HOW TO USE:
#   1. GitHub → Actions tab
#   2. Click "Deploy Terraform Infrastructure"
#   3. Click "Run workflow"
#   4. Select "plan" to preview changes, or "apply" to deploy them
#   5. Review the logs
# ─────────────────────────────────────────────────────────────────────────────

name: "Deploy Terraform Infrastructure"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

env:
  TF_WORKING_DIR: "./terraform"
  TF_VERSION: "1.12.0"

jobs:
  # ─── JOB 1: Quality Gate (safety net before deploy) ────────────────────────
  quality-gate:
    name: "① Quality Gate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "① terraform fmt — check formatting"
        run: terraform fmt -check -recursive

      - name: "② terraform validate — syntax check"
        run: |
          terraform init -backend=false
          terraform validate
        env:
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_tenant_id:       "00000000-0000-0000-0000-000000000000"
          TF_VAR_admin_password:  "DummyP@ss1!"

      - name: "🔍 Setup TFLint"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.51.0

      - name: "③ TFLint — lint Terraform code"
        run: |
          cp ../.tflint.hcl .tflint.hcl
          tflint --init
          tflint --format=compact --minimum-failure-severity=error

      - name: "④ Checkov — IaC security scan (warn only)"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: "⑤ Trivy — secrets and IaC scan (warn only)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: "table"
          exit-code: "0"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"

  # ─── JOB 2: Unit Tests ─────────────────────────────────────────────────────
  test:
    name: "② Unit Tests & Policy Checks"
    runs-on: ubuntu-latest
    needs: quality-gate
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "① terraform test — mock unit tests"
        run: |
          terraform init -backend=false
          terraform test \
            -filter=tests/unit_networking.tftest.hcl \
            -filter=tests/unit_compute.tftest.hcl \
            -filter=tests/unit_keyvault.tftest.hcl
        env:
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_tenant_id:       "00000000-0000-0000-0000-000000000000"
          TF_VAR_admin_password:  "MockP@ssw0rd123!"

      - name: "🔧 Setup Conftest"
        run: |
          CONFTEST_VERSION="0.51.0"
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz conftest
          sudo mv conftest /usr/local/bin/conftest

      - name: "② Conftest — generate plan JSON"
        run: |
          terraform init -backend=false
          terraform plan -out=tfplan_ci.binary \
            -var="subscription_id=00000000-0000-0000-0000-000000000000" \
            -var="tenant_id=00000000-0000-0000-0000-000000000000" \
            -var="admin_password=MockP@ssw0rd123!" 2>/dev/null || true
          terraform show -json tfplan_ci.binary 2>/dev/null > tfplan_ci.json || echo '{"resource_changes":[]}' > tfplan_ci.json

      - name: "② Conftest — evaluate OPA policies"
        run: |
          conftest test tfplan_ci.json \
            --policy ../policies \
            --namespace main

  # ─── JOB 3: Deploy (Plan / Apply) ─────────────────────────────────────────
  deploy:
    name: "③ Deploy — ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    environment:
      # Using a GitHub environment called "sandbox" allows for required reviewers
      # before apply runs. Set this up in: Repo → Settings → Environments → sandbox
      name: sandbox

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔑 Azure Login"
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: "🔧 Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform init"
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

      # Always run a plan (so "plan" action has useful output, and "apply" has a saved plan)
      - name: "terraform plan"
        id: plan
        run: |
          echo "🗺️ Action: ${{ github.event.inputs.action }}"
          echo ""
          terraform plan \
            -out=tfplan.binary \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="admin_password=${{ secrets.TF_VAR_admin_password }}"
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

      # Upload the plan binary regardless of action chosen (audit trail)
      - name: "Upload tfplan artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-deploy-${{ github.run_id }}-${{ github.sha }}"
          path: ${{ env.TF_WORKING_DIR }}/tfplan.binary
          retention-days: 90

      # Only run apply if the user explicitly chose "apply"
      - name: "terraform apply"
        if: github.event.inputs.action == 'apply'
        run: |
          echo "🚀 Applying Terraform changes..."
          terraform apply -auto-approve tfplan.binary
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

      - name: "✅ Deployment summary"
        run: |
          if [ "${{ github.event.inputs.action }}" == "apply" ]; then
            echo "✅ Terraform apply completed successfully."
            echo "Resources are now live in Azure."
          else
            echo "📋 Terraform plan completed. Review the output above."
            echo "Run this workflow again with action='apply' to deploy."
          fi
